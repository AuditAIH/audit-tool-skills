    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      - audio
      - document
      allowed_file_upload_methods:
      - remote_url
      - local_file
      enabled: true
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 10
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 1
    opening_statement: "# 本工具的功能: <span style=\"color:blue;\">[参考链接——飞书文档](https://docs.feishu.cn)</span>\n\
      \n## 1. 将PDF、图片格式文件，转化成表格或纯文本\n### 用法1：直接上传文件，发送即可快速响应为文本\n### 用法2：上传文件，并输入提示词【表格返回】，即可解析为表格格式\n\
      （用鼠标选中并复制到Excel中即可获得格式化表格）\n\n## 2. 将音频文件转化为纯文本\n### 用法1：直接上传，获得快速解析精准文本结果\n\
      ### 用法2：上传文件，并输入提示词【区分讲话人】\n\n## 3. 上传office文件并解密，6位数纯数字密码2分钟内破解\n### 用法：直接上传Excel、Word、PPT文件，即可破解密码\n\
      （仅限本人已获取授权的设备或文档才能解密）\n\n ⚠️ <span style=\"color:orange;\">特别提示</span>：Windows电脑桌面、压缩包文件、PDF文件等任意密码（联系系统管理员）忘记均可找回"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
